name: CI/CD

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: supereye_test
          POSTGRES_USER: supereye
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U supereye -d supereye_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://supereye:testpassword@localhost:5432/supereye_test
      AUTH_SECRET: ci-test-auth-secret-min-32-chars-long
      AUTH_GOOGLE_ID: ci-google-id
      AUTH_GOOGLE_SECRET: ci-google-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CORSAIR_KEK: ci-test-kek-32-chars-minimum-value
      WEBHOOK_SECRET: ci-webhook-secret
      CRON_SECRET: ci-cron-secret
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Typecheck has known pre-existing errors; re-enable after cleanup.
      # - name: Typecheck
      #   run: npm run typecheck

      - name: Run tests
        run: npm test
        continue-on-error: false

      - name: Run database migrations
        run: npm run db:migrate:prod

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: https://example.com

  deploy:
    name: Deploy to VPS
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          script: |
            set -e
            cd /opt/supereye
            git fetch origin main
            git reset --hard origin/main
            echo "${{ secrets.DEPLOY_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export DOCKER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "Deploy complete: $(docker compose -f docker-compose.prod.yml ps)"
